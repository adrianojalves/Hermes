<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" xmlns:o="http://omnifaces.org/ui"
	template="/WEB-INF/templates/Layout.xhtml">

	<f:metadata>
		<o:viewParam name="cod" value="#{cadastroUsuarioBean.usuario}" converter="#{converter}" />
		<f:viewAction action="#{cadastroUsuarioBean.inicializar}"></f:viewAction>
	</f:metadata>

	<ui:define name="content">
		<div class="ui-fluid paginas">
			<h:form id="frm">
				<div style="margin-top: 60px" />

				<p:growl id="msg" autoUpdate="true" life="6000" sticky="false" />

				<p:toolbar style="margin-top: 10px">
					<p:toolbarGroup>
						<p:commandButton process="@this painelCadastro" icon="fa fa-save"
							update="frm" value="Salvar"
							action="#{cadastroUsuarioBean.guardar}" />
					</p:toolbarGroup>

					<p:toolbarGroup styleClass="botoes-cadastro" align="right">
						<p:button icon="fa fa-undo"
							outcome="ListaUsuarios?faces-redirect=true" value="Pesquisa"
							process="@this">
						</p:button>
					</p:toolbarGroup>
				</p:toolbar>

				<p:fieldset legend="Dados Gerais" style="margin-top: 10px;">
					<p:panelGrid styleClass="remove-borda painel-cadastro"
						layout="grid" columns="1" id="painelCadastro"
						style="line-heigth:20px" columnClasses="ui-grid-col-10">

						<p:outputLabel value="Código: ">
							<p:outputLabel value="#{cadastroUsuarioBean.usuario.id}" />
						</p:outputLabel>

						<p:outputLabel value="Nome" for="nome">
							<p:inputText styleClass="campo75" id="nome"
								value="#{cadastroUsuarioBean.usuario.nome}" />
						</p:outputLabel>

						<p:outputLabel value="CPF" for="cpf">
								<p:inputMask mask="999.999.999-99"
									styleClass="campo35"
									value="#{cadastroUsuarioBean.usuario.cpf}" id="cpf" />
						</p:outputLabel>

						<p:outputLabel value="Login" for="login">
							<p:inputText styleClass="campo35" id="login"
								value="#{cadastroUsuarioBean.usuario.login}" />
						</p:outputLabel>

						<p:commandButton style="width:150px" value="Alterar Senha"
							actionListener="#{cadastroUsuarioBean.configMostraSenha}"
							rendered="#{!cadastroUsuarioBean.mostrarSenha}" id="botaoSenha"
							update="painelCadastro" process="@this"></p:commandButton>

						<p:outputLabel id="labelSenha1"
							rendered="#{cadastroUsuarioBean.mostrarSenha}" for="senha"
							value="Senha:">
							<p:password id="senha"
								rendered="#{cadastroUsuarioBean.mostrarSenha}"
								styleClass="campo25" value="#{cadastroUsuarioBean.usuario.senha}"
								match="senha2"
								validatorMessage="As senhas digitadas não são iguais"
								label="Senha" />
						</p:outputLabel>

						<p:outputLabel rendered="#{cadastroUsuarioBean.mostrarSenha}"
							id="labelSenha2" for="senha2" value="Repita a senha: ">
							<p:password rendered="#{cadastroUsuarioBean.mostrarSenha}"
								id="senha2" styleClass="campo25"
								value="#{cadastroUsuarioBean.usuario.senha}"
								label="Repita a senha" />
						</p:outputLabel>

					</p:panelGrid>
				</p:fieldset>
			</h:form>
		</div>
	</ui:define>
</ui:composition>
