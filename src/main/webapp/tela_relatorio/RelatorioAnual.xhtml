<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" xmlns:o="http://omnifaces.org/ui"
	template="/WEB-INF/templates/Layout.xhtml">

	<ui:define name="content">
		<div class="ui-fluid paginas">
			<h:form id="frm">
				<div style="margin-top: 60px" />

				<p:growl id="msg" autoUpdate="true" life="6000" sticky="false" />

				<p:toolbar style="margin-top: 10px">
					<p:toolbarGroup>
						<p:commandButton process="@this painelCadastro"
							icon="fa fa-download" update="frm" value="Download" ajax="false"
							action="#{relatorioAnualBean.imprimir}" />
					</p:toolbarGroup>

					<p:toolbarGroup styleClass="botoes-cadastro" align="right">
					</p:toolbarGroup>
				</p:toolbar>

				<p:fieldset legend="Relatório Anual" style="margin-top: 10px;">
					<p:panelGrid styleClass="remove-borda painel-cadastro"
						layout="grid" columns="1" id="painelCadastro"
						style="line-heigth:20px" columnClasses="ui-grid-col-8">

						<p:outputLabel value="Tipo Relatório" for="tipoRelatorio">
							<p:selectOneMenu styleClass="campo25" id="tipoRelatorio"
								value="#{relatorioAnualBean.tipoRel}">
								<f:selectItems value="#{arrayUtils.tiposRels}" var="tipo"
									itemLabel="#{tipo.descricao}" itemValue="#{tipo}" />
							</p:selectOneMenu>
						</p:outputLabel>

						<p:outputLabel value="Cliente" for="cliente">
							<p:autoComplete id="cliente" label="Cliente"
								placeholder="Digite o nome do cliente ou clique na lupa para pesquisar"
								value="#{relatorioAnualBean.codCliente}"
								completeMethod="#{completerMethods.completaCliente}"
								forceSelection="true" var="cli" itemLabel="#{cli.nome}"
								itemValue="#{cli}" styleClass="campo75 pesquisaLupa"
								minQueryLength="2" maxResults="10">
								<f:converter binding="#{converter}" />
								<p:ajax event="itemSelect" update=":frm:cliente :frm:msg" />
							</p:autoComplete>
							<p:commandButton style="width:35px" icon="ui-icon-search"
								title="Pesquisar" process="@this" update="@none" id="bpesqcli"
								action="#{dialogosBean.abrirDialogoCliente}"
								ignoreAutoUpdate="true">
								<p:ajax event="dialogReturn"
									listener="#{relatorioAnualBean.capturaCliente}"
									update=":frm:cliente :frm:msg" />
							</p:commandButton>
						</p:outputLabel>
						
						<p:outputLabel value="Data Inicial" for="dataInicial">
							<p:calendar styleClass="campo50" showOn="button" id="dataInicial"
								value="#{relatorioAnualBean.dataInicial}" navigator="true"
								pattern="#{patterns.data}" locale="pt_BR" mask="true" />
						</p:outputLabel>
						
						<p:outputLabel value="Data Final" for="dataFinal">
							<p:calendar styleClass="campo50" showOn="button" id="dataFinal"
								value="#{relatorioAnualBean.dataFinal}" navigator="true"
								pattern="#{patterns.data}" locale="pt_BR" mask="true" />
						</p:outputLabel>
					</p:panelGrid>
				</p:fieldset>

			</h:form>
		</div>
	</ui:define>
</ui:composition>
