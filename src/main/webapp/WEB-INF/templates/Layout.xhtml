<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
	<link rel="icon" type="image/x-icon" href="#{resource['ajasoftware/images/favicon.ico']}"/>
	<f:facet name="first">
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
	</f:facet>

	<title>.::Hermes::.</title>

	<h:outputStylesheet library="ajasoftware" name="styles/custom.css" />
	<h:outputStylesheet library="ajasoftware" name="styles/icons.css" />
	<h:outputStylesheet library="ajasoftware" name="styles/layout.css" />
	<h:outputStylesheet library="ajasoftware" name="styles/components.css" />

	<h:outputScript target="body" library="primefaces"
		name="jquery/jquery.js" />
	<h:outputScript target="body" library="ajasoftware"
		name="javascripts/app.js" />
</h:head>

<h:body>

	<header class="aw-topbar">
		<div style="float: left;">
		<h:graphicImage style="margin-top:7px" library="ajasoftware" name="images/logo.png" />
		<span class="aw-name" style="font-weight: bold;">
				Hermes - Controle Interno.
			</span>
		</div>
		

		<div style="float: right;">
			<span class="aw-name" style="float: left; font-weight: bold">
				Seja bem-vindo: <span class="nome-usuario">#{seguranca.nomeUsuario}</span>.
			</span>
		</div>
	</header>



<!-- 	<aside class="aw-sidebar  js-sidebar"> -->
<!-- 		<ui:include src="Menu.xhtml" /> -->
<!-- 	</aside> -->

	<p:confirmDialog global="true" styleClass="confirm">
		<p:commandButton value="Não" type="button"
			styleClass="ui-confirmdialog-no" icon="ui-icon-close" />

		<p:commandButton value="Sim" type="button"
			styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
	</p:confirmDialog>

	<p:ajaxStatus onstart="PF('statusDialog').show()"
		oncomplete="PF('statusDialog').hide();" />

	<p:dialog widgetVar="statusDialog" modal="false" draggable="false"
		closable="false" resizable="false" showHeader="false"
		styleClass="ajax-status">
		<h:graphicImage library="ajasoftware" name="images/loading.gif" />
	</p:dialog>

	<section class="aw-content  js-content">
		<ui:insert name="content" />
	</section>

	<footer class="footer">
		<ui:include src="Menu.xhtml" />
	</footer>

</h:body>

</html>
